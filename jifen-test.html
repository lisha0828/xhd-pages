<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试发送</title>
<style>
  body { font-family: "PingFang SC", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
  .box { background: #fff; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.08); max-width: 400px; width: 90%; }
  h2 { font-size: 18px; margin-bottom: 12px; color: #333; }
  p { font-size: 14px; color: #999; margin-bottom: 24px; }
  button { padding: 14px 32px; background: linear-gradient(135deg, #ff9a44, #fc6076); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
  #status { margin-top: 20px; font-size: 15px; font-weight: 600; }
</style>
</head>
<body>
<div class="box">
  <h2>🧪 测试数据触发</h2>
  <p>点击按钮向多维表格发送一条测试数据，让飞书自动化识别「可领积分日期」字段。完成后记得删除表格里的测试记录。</p>
  <button onclick="sendTest()">发送测试数据</button>
  <div id="status"></div>
</div>
<script>
async function sendTest() {
  const status = document.getElementById('status');
  status.textContent = '发送中...';
  status.style.color = '#999';

  try {
    await fetch('https://xhd.feishu.cn/base/automation/webhook/event/OsnSaRyh5wMSO2hJ0hmc3iW7nMb', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        "申请日期": "2025-04-05",
        "报名学员姓名": "测试学员",
        "报名学员电话": "13800000000",
        "学员初次报名时间": "2025-01-05",
        "学员续费时间": "",
        "推荐/续费": "推荐",
        "报名课程": "测试课程",
        "报名金额": "10000",
        "所属顾问/所属助教": "龚丽莎",
        "获得人": "测试获得人",
        "获得人电话": "13900000000",
        "获得人所属校区": "IFS",
        "兑换积分": "100",
        "兑换礼品名称": "京东E卡",
        "兑换礼品数量": "1张",
        "备注": "测试",
        "可领积分日期": "2025-04-05"
      })
    });
    status.textContent = '✅ 发送完成！去飞书自动化刷新一下，然后删掉表格里的测试记录。';
    status.style.color = '#2e7d62';
  } catch(e) {
    status.textContent = '❌ 发送失败，请检查网络';
    status.style.color = '#c0392b';
  }
}
</script>
</body>
</html>
