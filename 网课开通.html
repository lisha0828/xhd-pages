<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网课开通 — 新航道成都学校</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --ink: #1a1a2e; --deep: #16213e; --mid: #0f3460;
    --gold: #e2a24b; --gold-light: #f5c97a; --cream: #fdf6ec;
    --muted: #8a8fa8; --line: #ddd5c8; --success: #3d9970; --err: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream); font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink); min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 48px 20px 80px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; height: 320px;
    background: linear-gradient(160deg, var(--deep) 0%, var(--mid) 100%); z-index: 0;
  }
  body::after {
    content: '新航道'; position: fixed; top: -20px; right: -20px;
    font-family: 'Noto Serif SC', serif; font-size: 200px; font-weight: 700;
    color: rgba(255,255,255,0.03); letter-spacing: -8px;
    pointer-events: none; z-index: 0; user-select: none;
  }
  .header { position: relative; z-index: 1; text-align: center; margin-bottom: 40px; color: white; }
  .header .logo-label { font-size: 11px; letter-spacing: 4px; color: var(--gold-light); margin-bottom: 12px; font-weight: 300; }
  .header h1 { font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 700; letter-spacing: 2px; }
  .header h1 span { color: var(--gold); }
  .header p { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.55); letter-spacing: 1px; }
  .card {
    position: relative; z-index: 1; background: white; border-radius: 16px;
    width: 100%; max-width: 560px;
    box-shadow: 0 20px 60px rgba(15,52,96,0.18), 0 4px 16px rgba(0,0,0,0.08); overflow: hidden;
  }
  .card-top {
    background: linear-gradient(135deg, var(--mid) 0%, var(--deep) 100%);
    padding: 24px 32px; display: flex; align-items: center; gap: 14px;
  }
  .card-top .icon {
    width: 44px; height: 44px; background: rgba(226,162,75,0.2); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .card-top h2 { font-family: 'Noto Serif SC', serif; font-size: 18px; color: white; font-weight: 600; }
  .card-top p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .card-body { padding: 32px; }
  .section-label {
    font-size: 10px; letter-spacing: 3px; color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 1px; }
  .field label .req { color: var(--gold); margin-left: 2px; }
  .field input {
    border: 1.5px solid var(--line); border-radius: 8px; padding: 11px 14px;
    font-size: 15px; font-family: 'Noto Sans SC', sans-serif; color: var(--ink);
    transition: border-color .2s, box-shadow .2s; outline: none; background: #fafafa;
  }
  .field input:focus { border-color: var(--mid); box-shadow: 0 0 0 3px rgba(15,52,96,0.08); background: white; }
  .field .errmsg { font-size: 11px; color: var(--err); display: none; }
  .field.bad .errmsg { display: block; }
  .field.bad input { border-color: var(--err); }
  .course-section { margin-bottom: 28px; }
  .ctable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .ctable th {
    background: #f5f0e8; color: var(--muted); font-weight: 500; font-size: 11px;
    letter-spacing: 1px; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--line);
  }
  .ctable th:first-child { border-radius: 8px 0 0 0; }
  .ctable th:last-child { border-radius: 0 8px 0 0; }
  .ctable td { padding: 11px 12px; border-bottom: 1px solid #f0ebe3; vertical-align: middle; }
  .ctable tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; border-radius: 5px; padding: 2px 8px; font-size: 12px; }
  .badge.course { background: rgba(15,52,96,0.08); color: var(--mid); font-weight: 500; }
  .badge.days { background: rgba(226,162,75,0.12); color: #b07d2a; }
  .badge.free { background: rgba(61,153,112,0.1); color: var(--success); }
  .notice {
    background: #f0f4f8; border-left: 3px solid var(--mid); border-radius: 0 8px 8px 0;
    padding: 12px 16px; font-size: 12px; line-height: 1.8; color: #4a5568; margin-bottom: 28px;
  }
  .notice strong { color: var(--mid); display: block; margin-bottom: 4px; font-size: 11px; letter-spacing: 1px; }
  .btn {
    width: 100%; padding: 15px; background: linear-gradient(135deg, var(--gold) 0%, #c8882d 100%);
    color: white; border: none; border-radius: 10px; font-size: 16px;
    font-family: 'Noto Serif SC', serif; font-weight: 600; letter-spacing: 2px;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(200,136,45,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,136,45,0.45); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: default; transform: none; }
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--deep); color: white; padding: 14px 24px;
    border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .4s;
    opacity: 0; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast .chk {
    width: 22px; height: 22px; background: var(--success); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
  }
  .footer { position: relative; z-index: 1; margin-top: 28px; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  @media (max-width:480px) {
    .field-group { grid-template-columns: 1fr; }
    .card-body { padding: 24px 20px; }
    .card-top { padding: 20px 24px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo-label">新航道成都学校</div>
  <h1>网课<span>开通</span>申请</h1>
  <p>填写学生信息，一键生成开通表格</p>
</div>

<div class="card">
  <div class="card-top">
    <div class="icon">📋</div>
    <div><h2>学生信息登记</h2><p>请如实填写，信息将同步至课程系统</p></div>
  </div>
  <div class="card-body">
    <div class="notice">
      <strong>填写须知</strong>
      红色标记为必填项 &nbsp;·&nbsp; 手机号须为 11 位数字 &nbsp;·&nbsp; 下方课程已预设，无需修改
    </div>
    <div class="section-label">学生信息</div>
    <div class="field-group">
      <div class="field" id="fn">
        <label>姓名 <span class="req">*</span></label>
        <input type="text" id="iname" placeholder="请输入学生姓名" maxlength="20">
        <span class="errmsg">请输入姓名</span>
      </div>
      <div class="field" id="fp">
        <label>手机号 <span class="req">*</span></label>
        <input type="tel" id="iphone" placeholder="请输入11位手机号" maxlength="11">
        <span class="errmsg">请输入有效的11位手机号</span>
      </div>
    </div>
    <div class="course-section">
      <div class="section-label">开通课程</div>
      <table class="ctable">
        <thead><tr><th>课程名称</th><th>有效期</th><th>实付金额</th></tr></thead>
        <tbody>
          <tr>
            <td><span class="badge course">语法</span></td>
            <td><span class="badge days">360 天</span></td>
            <td><span class="badge free">赠送</span></td>
          </tr>
          <tr>
            <td><span class="badge course">语音</span></td>
            <td><span class="badge days">360 天</span></td>
            <td><span class="badge free">赠送</span></td>
          </tr>
        </tbody>
      </table>
    </div>
    <button class="btn" id="genbtn" onclick="generateExcel()">⬇ 生成并下载 Excel 表格</button>
  </div>
</div>

<div class="footer">© 新航道成都学校 · 网课开通系统</div>
<div class="toast" id="toast"><div class="chk">✓</div><span id="tmsg"></span></div>

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('tmsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function validate() {
  let ok = true;
  const fn = document.getElementById('fn'), fp = document.getElementById('fp');
  fn.classList.remove('bad'); fp.classList.remove('bad');
  if (!document.getElementById('iname').value.trim()) { fn.classList.add('bad'); ok = false; }
  if (!/^\d{11}$/.test(document.getElementById('iphone').value.trim())) { fp.classList.add('bad'); ok = false; }
  return ok;
}

function escXml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function generateExcel() {
  if (!validate()) return;
  const name  = document.getElementById('iname').value.trim();
  const phone = document.getElementById('iphone').value.trim();

  const btn = document.getElementById('genbtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中…';

  try {
    // 1. Decode original file bytes
    const binStr = atob(ORIG);
    const bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);

    // 2. Load as ZIP
    const zip = await JSZip.loadAsync(bytes);

    // 3. Patch sharedStrings.xml — append name (idx=11) and phone (idx=12)
    let ss = await zip.file('xl/sharedStrings.xml').async('string');
    // Update count attributes
    ss = ss.replace(/count="11"/, 'count="13"');
    ss = ss.replace(/uniqueCount="11"/, 'uniqueCount="13"');
    // Append two new <si> before closing </sst>
    const nameEsc  = escXml(name);
    const phoneEsc = escXml(phone);
    ss = ss.replace('</sst>', '<si><t>' + nameEsc + '</t></si><si><t>' + phoneEsc + '</t></si></sst>');
    zip.file('xl/sharedStrings.xml', ss);

    // 4. Patch sheet1.xml — fill A3,B3,A4,B4 with shared string refs 11 and 12
    let sh = await zip.file('xl/worksheets/sheet1.xml').async('string');
    // A3: style 5, currently empty -> add t="s" and <v>11</v>
    sh = sh.replace('<c r="A3" s="5"/>', '<c r="A3" s="5" t="s"><v>11</v></c>');
    // B3: style 1, currently empty
    sh = sh.replace('<c r="B3" s="1"/>', '<c r="B3" s="1" t="s"><v>12</v></c>');
    // A4: style 5, currently empty
    sh = sh.replace('<c r="A4" s="5"/>', '<c r="A4" s="5" t="s"><v>11</v></c>');
    // B4: style 1, currently empty
    sh = sh.replace('<c r="B4" s="1"/>', '<c r="B4" s="1" t="s"><v>12</v></c>');
    zip.file('xl/worksheets/sheet1.xml', sh);

    // 5. Generate and download
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '网课开通_' + name + '_' + phone + '.xlsx';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ 表格已下载：' + name + ' / ' + phone);
  } catch(e) {
    toast('❌ 生成失败：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ 生成并下载 Excel 表格';
  }
}

document.getElementById('iphone').addEventListener('input', function() { this.value = this.value.replace(/\D/g,''); });
document.getElementById('iname').addEventListener('input', () => document.getElementById('fn').classList.remove('bad'));
document.getElementById('iphone').addEventListener('input', () => document.getElementById('fp').classList.remove('bad'));
document.addEventListener('keydown', e => { if (e.key === 'Enter') generateExcel(); });
</script>
